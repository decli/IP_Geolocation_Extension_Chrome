name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test
        run: npm test

      - name: Check JavaScript syntax
        run: npm run check

      - name: Build Chrome ZIP
        run: npm run build

      - name: Verify archive
        run: unzip -t build/chrome.zip

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ip-geolocation-extension-chrome
          path: build/chrome.zip
          if-no-files-found: error
          retention-days: 7
