name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to rebuild and publish
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Test
        run: npm test

      - name: Check JavaScript syntax
        run: npm run check

      - name: Build ZIP
        run: |
          npm run build
          mkdir -p dist
          cp build/chrome.zip "dist/IP-Geolocation-Extension-Chrome-${RELEASE_TAG}.zip"

      - name: Prepare clean CRX source
        run: |
          bash build.sh dev chrome
          test ! -e dev/chrome.zip

      - name: Check for CRX signing key
        id: crx-signing
        env:
          CRX_PRIVATE_KEY_BASE64: ${{ secrets.CRX_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -n "$CRX_PRIVATE_KEY_BASE64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed CRX
        if: steps.crx-signing.outputs.available == 'true'
        env:
          CRX_PRIVATE_KEY_BASE64: ${{ secrets.CRX_PRIVATE_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/extension.pem"
          trap 'rm -f "$KEY_PATH"' EXIT
          printf '%s' "$CRX_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable)"
          xvfb-run --auto-servernum "$CHROME_BIN" \
            --no-sandbox \
            --disable-gpu \
            --pack-extension="$GITHUB_WORKSPACE/dev" \
            --pack-extension-key="$KEY_PATH"
          mv dev.crx "dist/IP-Geolocation-Extension-Chrome-${RELEASE_TAG}.crx"
          test -s "dist/IP-Geolocation-Extension-Chrome-${RELEASE_TAG}.crx"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
